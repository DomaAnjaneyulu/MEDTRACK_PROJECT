<!DOCTYPE html>
<html>
<head>
    <title>Patient Registration - MedTrack</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-user"></i> Patient Registration</h1>
        <p>Create your account to book appointments with qualified doctors.</p>

        <form method="POST" action="/patient_register">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit"><i class="fas fa-user-plus"></i> Register</button>
        </form>

        <p>Already registered? <a href="/patient_login">Login here</a></p>
    </div>
    </body>
</html>
