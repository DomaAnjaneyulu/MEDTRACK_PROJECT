<!DOCTYPE html>
<html>
<head>
    <title>Patient Dashboard - MedTrack</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-calendar-check"></i> Book an Appointment</h1>
        <p>Select a doctor and date to schedule your appointment easily.</p>

        <form method="POST" action="/patient_dashboard">
            <label>Select Doctor:</label>
            <select name="doctor" required>
                {% for doctor in doctors %}
                <option value="{{ doctor.id }}">{{ doctor.name }} ({{ doctor.speciality }})</option>
                {% endfor %}
            </select>

            <label>Select Date:</label>
            <input type="date" name="date" required>

            <button type="submit">
            <i class="fas fa-calendar-plus"></i> Book Appointment
            </button>
        </form>
        

        <h2>Available Doctors</h2>
        <ul>
            {% for doctor in doctors %}
            <li><i class="fas fa-user-md"></i> {{ doctor.name }} - {{ doctor.speciality }}</li>
            {% endfor %}
        </ul>
        <p class="appointments-link">
            <a href="{{ url_for('view_appointments') }}">View My Appointments</a>
        </p>
        <div id="notification" class="notification">
            Appointment Booked Successfully ✔
        </div>

        <script src="/static/js/notification.js"></script>

        {% if booked %}
        <script>
        window.onload = function(){
            showNotification("Appointment Booked Successfully ✔");
        }
        </script>
        {% endif %}
        
    </div>
    
    
</body>

</html>
