<!DOCTYPE html>
<html>
<head>
    <title>Doctor Registration - MedTrack</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-user-md"></i> Doctor Registration</h1>
        <p>Create your account to manage your schedule and appointments.</p>

        <form method="POST" action="/doctor_register">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="text" name="speciality" placeholder="Speciality" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit"><i class="fas fa-user-plus"></i> Register</button>
        </form>
        <label>Available Timings</label>

        <select name="timing">
        <option value="9AM-12PM">9 AM - 12 PM</option>
        <option value="12PM-3PM">12 PM - 3 PM</option>
        <option value="3PM-6PM">3 PM - 6 PM</option>
        <option value="6PM-9PM">6 PM - 9 PM</option>
        </select>
        <label>Available Days</label>

        <select name="days">
        <option>Monday-Friday</option>
        <option>Monday-Saturday</option>
        <option>Weekends</option>
        <option>All Days</option>
        </select>

        <p>Already registered? <a href="/doctor_login">Login here</a></p>
    </div>
    </body>
</html>
