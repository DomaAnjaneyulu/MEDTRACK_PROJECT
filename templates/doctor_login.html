<!DOCTYPE html>
<html>
<head>
    <title>Doctor Login - MedTrack</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-user-md"></i> Doctor Login</h1>
        <p>Access your dashboard to view patient appointments.</p>

        <form method="POST" action="/doctor_login">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit"><i class="fas fa-sign-in-alt"></i> Login</button>
        </form>

        <p>New doctor? <a href="/doctor_register">Register here</a></p>
    </div>
    </body>
</html>
